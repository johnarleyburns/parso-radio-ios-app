name: ParsoMusic
options:
  bundleIdPrefix: com.parso
  deploymentTarget:
    iOS: "17.0"
generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
  configs:
    Debug:
      CODE_SIGNING_ALLOWED: NO
    Release:
      CODE_SIGNING_REQUIRED: YES
      CODE_SIGNING_ALLOWED: YES

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.0"
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"

targets:
  ParsoMusic:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ParsoRadio
        excludes:
          - "**/.DS_Store"
          - "**/Tests/**"
          - "**/*Tests.swift"
          - "**/*Mock*.swift"
          - "**/LinuxStubs/**"
    info:
      path: ParsoRadio/Info.plist
      properties:
        CFBundleDisplayName: Lorewave
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
        ITSAppUsesNonExemptEncryption: false
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: false
        # App Transport Security: the entire app stays HTTPS-only EXCEPT for
        # podcast media loading, where several public broadcasters' enclosure
        # URLs are still http and/or redirect to http-only CDNs (BBC's mediaset
        # → bbc.pdn.tritondigital.com is the canonical case). Without this the
        # AVPlayerItem load silently fails — the "BBC Global News loads forever
        # with no spinner" symptom. Two narrow allowances:
        #  • NSAllowsArbitraryLoadsInMedia — AVFoundation media loading only;
        #    covers the default playback path for any http podcast.
        #  • NSExceptionDomains — specific BBC + CDN hosts, needed for the
        #    streaming-cache delegate's own URLSession (which is not under
        #    AVFoundation's media-loading scope).
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInMedia: true
          NSExceptionDomains:
            bbc.co.uk:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
            bbci.co.uk:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
            tritondigital.com:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.ios-radio-app
        MARKETING_VERSION: "2.0.1"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        ENABLE_TESTABILITY: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "$(CI_CERT)"
          DEVELOPMENT_TEAM: "$(CI_TEAM)"
          PROVISIONING_PROFILE_SPECIFIER: "$(CI_PROFILE)"
    dependencies:
      - package: SQLite

  ParsoMusicTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ParsoRadio/Core/Tests
        excludes:
          - "**/LinuxStubs/**"
    dependencies:
      - target: ParsoMusic
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleShortVersionString: "2.0.0"
        INFOPLIST_KEY_CFBundleVersion: "1"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ParsoMusic.app/ParsoMusic"
        BUNDLE_LOADER: "$(TEST_HOST)"

  ParsoMusicIntegrationTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ParsoRadio/Integration/Tests
    dependencies:
      - target: ParsoMusic
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleShortVersionString: "2.0.0"
        INFOPLIST_KEY_CFBundleVersion: "1"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ParsoMusic.app/ParsoMusic"
        BUNDLE_LOADER: "$(TEST_HOST)"

  ParsoMusicUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ParsoRadio/UITests
    dependencies:
      - target: ParsoMusic
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  ParsoMusic:
    build:
      targets:
        ParsoMusic: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ParsoMusicTests
        - ParsoMusicIntegrationTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ParsoMusicTests:
    build:
      targets:
        ParsoMusicTests: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
