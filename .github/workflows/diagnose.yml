name: SDK Diagnostic
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  diagnose:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Xcode version and SDKs
        run: |
          xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks
          ls /Applications/ | grep Xcode
