name: iOS Build & TestFlight

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  # ─── Run tests before building ────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s /Applications/$XCODE
          xcodebuild -version

      - name: Accept Xcode License
        run: sudo xcodebuild -license accept

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Developer/Xcode/DerivedData/*/SourcePackages
          key: spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-

      # Dynamically find the best available iPhone simulator — avoids
      # hardcoded names like "iPhone 16" that break when Apple renames devices
      - name: Resolve simulator UDID
        id: simulator
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          devices = []
          for runtime, device_list in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              for d in device_list:
                  if d['isAvailable'] and 'iPhone' in d['name']:
                      devices.append((runtime, d['udid'], d['name']))
          devices.sort(key=lambda x: x[0], reverse=True)
          if devices:
              print(devices[0][1])
          else:
              sys.exit(1)
          ")
          NAME=$(xcrun simctl list devices available --json \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, device_list in data['devices'].items():
              for d in device_list:
                  if d['udid'] == '$UDID':
                      print(d['name']); sys.exit(0)
          ")
          echo "Using simulator: $NAME ($UDID)"
          echo "udid=$UDID" >> $GITHUB_OUTPUT

      - name: Boot simulator
        run: |
          UDID="${{ steps.simulator.outputs.udid }}"
          xcrun simctl boot "$UDID" || true
          for i in $(seq 1 12); do
            STATE=$(xcrun simctl list devices | grep "$UDID" | grep -o 'Booted' || true)
            [ "$STATE" = "Booted" ] && echo "Simulator booted." && break
            echo "Waiting... ($i/12)"; sleep 5
          done

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project ParsoMusic.xcodeproj \
            -scheme ParsoMusic \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -only-testing:ParsoMusicTests \
            -resultBundlePath TestResults/unit-tests.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee test.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
          retention-days: 7

  # ─── Integration tests against the real Internet Archive API ─────────────
  integration-tests:
    name: Integration Tests
    runs-on: macos-latest
    needs: test
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s /Applications/$XCODE
          xcodebuild -version

      - name: Accept Xcode License
        run: sudo xcodebuild -license accept

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Developer/Xcode/DerivedData/*/SourcePackages
          key: spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-

      - name: Resolve simulator UDID
        id: simulator
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          devices = []
          for runtime, device_list in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              for d in device_list:
                  if d['isAvailable'] and 'iPhone' in d['name']:
                      devices.append((runtime, d['udid'], d['name']))
          devices.sort(key=lambda x: x[0], reverse=True)
          if devices:
              print(devices[0][1])
          else:
              sys.exit(1)
          ")
          echo "udid=$UDID" >> $GITHUB_OUTPUT

      - name: Boot simulator
        run: |
          UDID="${{ steps.simulator.outputs.udid }}"
          xcrun simctl boot "$UDID" || true
          for i in $(seq 1 12); do
            STATE=$(xcrun simctl list devices | grep "$UDID" | grep -o 'Booted' || true)
            [ "$STATE" = "Booted" ] && echo "Simulator booted." && break
            echo "Waiting... ($i/12)"; sleep 5
          done

      - name: Run integration tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project ParsoMusic.xcodeproj \
            -scheme ParsoMusic \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -only-testing:ParsoMusicIntegrationTests \
            -resultBundlePath TestResults/integration-tests.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee integration-test.log

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: TestResults/
          retention-days: 7

      - name: Upload integration test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-log
          path: integration-test.log
          retention-days: 7

  # ─── TestFlight build — only runs if both test jobs pass ──────────────────
  testflight-build:
    runs-on: macos-latest
    needs: [test, integration-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s /Applications/$XCODE
          xcodebuild -version

      - name: Accept Xcode License
        run: sudo xcodebuild -license accept

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -eo pipefail
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o certificate.p12
          security import certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k build.keychain
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Import Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -eo pipefail
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            -o "$HOME/Library/MobileDevice/Provisioning Profiles/Parso_Radio_App_Store.mobileprovision"

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Developer/Xcode/DerivedData/*/SourcePackages
          key: spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-

      - name: Set Build Number
        run: xcrun agvtool new-version -all ${{ github.run_number }}

      - name: Archive
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          set -eo pipefail
          xcodebuild archive \
            -project ParsoMusic.xcodeproj \
            -scheme ParsoMusic \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./build/ParsoMusic.xcarchive \
            ARCHS=arm64 \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            CI_TEAM="$TEAM_ID" \
            CI_CERT="Apple Distribution" \
            CI_PROFILE="Parso Radio App Store" \
            2>&1 | tee build.log
          if [ ! -d "./build/ParsoMusic.xcarchive" ]; then
            echo "Archive not found — build failed"
            grep -E 'error:' build.log | head -20
            exit 1
          fi

      - name: Export IPA
        run: |
          set -eo pipefail
          xcodebuild -exportArchive \
            -archivePath ./build/ParsoMusic.xcarchive \
            -exportPath ./output \
            -exportOptionsPlist ExportOptions.plist

      - name: Write App Store Connect API Key
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          set -eo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_API_PRIVATE_KEY" \
            > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8

      - name: Upload to TestFlight
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          set -eo pipefail
          xcrun altool --upload-app \
            --type ios \
            --file output/ParsoMusic.ipa \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain build.keychain
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8
